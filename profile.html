<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0f0f1e 0%, #1a1a2f 100%);
            min-height: 100vh;
            color: #f0f0f0;
            line-height: 1.5;
            animation: bgShift 20s ease infinite alternate;
            background-size: 200% 200%;
        }

        @keyframes bgShift {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        header {
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        header a {
            color: #fff;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
            font-weight: 500;
            backdrop-filter: blur(5px);
        }

        header a:hover {
            background: rgba(255,75,43,0.3);
            border-color: #ff4b2b;
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff4b2b;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Card */
        .profile-card {
            background: rgba(30, 30, 50, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 2.5rem 2rem;
            text-align: center;
            margin-bottom: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .profile-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7);
        }

        .profile-photo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 1.5rem;
            border: 4px solid #ff4b2b;
            box-shadow: 0 10px 30px rgba(255, 75, 43, 0.4);
            transition: all 0.4s;
        }

        .profile-photo:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 0 30px #ff4b2b;
        }

        #profile-name {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #e0e0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: left;
            backdrop-filter: blur(5px);
        }

        .info p {
            margin: 0.8rem 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ddd;
            font-size: 1.1rem;
        }

        .info i {
            width: 24px;
            color: #ff4b2b;
            font-size: 1.3rem;
        }

        button {
            background: linear-gradient(145deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(255, 75, 43, 0.4);
            border: 1px solid rgba(255,255,255,0.2);
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }

        button:hover {
            transform: scale(1.06);
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.7);
            background: linear-gradient(145deg, #ff4b2b, #ff416c);
        }

        /* Upload Area */
        .upload-area {
            background: rgba(30, 30, 50, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 2rem;
            margin-bottom: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .upload-area h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
        }

        .upload-area h2 i {
            color: #ff4b2b;
        }

        .upload-area input, .upload-area textarea {
            width: 100%;
            padding: 1rem 1.2rem;
            margin-bottom: 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .upload-area input:focus, .upload-area textarea:focus {
            border-color: #ff4b2b;
            box-shadow: 0 0 0 3px rgba(255, 75, 43, 0.3);
        }

        .upload-area input[type="file"] {
            padding: 0.8rem;
            background: rgba(255,255,255,0.05);
        }

        .upload-area button {
            width: auto;
            min-width: 200px;
        }

        #upload-progress {
            margin-top: 1rem;
            color: #ffb6a0;
            font-weight: 500;
        }

        /* Video Grid */
        .videos-section h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            font-weight: 500;
            border-left: 8px solid #ff4b2b;
            padding-left: 1.5rem;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 2rem;
        }

        .video-card {
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 15px 25px -8px rgba(0,0,0,0.5);
        }

        .video-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 30px 40px -10px #ff4b2b80, 0 0 0 1px #ff4b2b inset;
        }

        .thumbnail {
            width: 100%;
            height: 150px;
            background-color: #2a2a3a;
            background-size: cover;
            background-position: center;
        }

        .video-info {
            padding: 1.2rem;
        }

        .video-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.8rem;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .delete-btn {
            background: rgba(220, 53, 69, 0.2);
            color: #ff8a92;
            border: 1px solid rgba(255, 75, 75, 0.5);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .delete-btn:hover {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
            box-shadow: 0 0 15px #dc3545;
            transform: scale(1.02);
        }

        /* Logged out view */
        #logged-out-view {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(30,30,50,0.5);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 500px;
            margin: 3rem auto;
            animation: fadeIn 0.8s;
        }

        #logged-out-view h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #logged-out-view a {
            color: #ff4b2b;
            font-weight: bold;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        #logged-out-view a:hover {
            border-bottom-color: #ff4b2b;
        }

        /* Modal Konfirmasi Hapus & Logout */
        .delete-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeInModal 0.3s ease;
        }

        @keyframes fadeInModal {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 75, 43, 0.3);
            border-radius: 40px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            animation: slideUpModal 0.4s ease;
        }

        @keyframes slideUpModal {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content i {
            font-size: 4rem;
            color: #ff4b2b;
            margin-bottom: 1rem;
        }

        .modal-content h3 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: white;
        }

        .modal-content p {
            color: #b0b0d0;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-actions button {
            margin-top: 0;
            padding: 0.8rem 1.8rem;
            font-size: 1rem;
            min-width: 120px;
        }

        .cancel-btn {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .confirm-btn {
            background: linear-gradient(145deg, #ff416c, #ff4b2b);
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-user-astronaut" style="margin-right: 8px;"></i>Profil Saya</h1>
        <a href="index.html"><i class="fas fa-arrow-left" style="margin-right: 6px;"></i>Kembali</a>
    </header>

    <div class="container">
        <!-- Tampilan ketika sudah login -->
        <div id="logged-in-view" style="display: none;">
            <div class="profile-card">
                <img id="profile-photo" class="profile-photo" src="" alt="Foto Profil">
                <h2 id="profile-name"></h2>
                <div class="info">
                    <p><i class="fas fa-envelope"></i> <span id="profile-email"></span></p>
                    <p><i class="fas fa-id-card"></i> <span id="profile-id"></span></p>
                </div>
                <button id="logout-btn"><i class="fas fa-sign-out-alt" style="margin-right: 8px;"></i>Logout</button>
            </div>

            <!-- Form Upload -->
            <div class="upload-area">
                <h2><i class="fas fa-cloud-upload-alt"></i> Upload Video</h2>
                <input type="text" id="video-title" placeholder="Judul Video" required>
                <textarea id="video-desc" placeholder="Deskripsi Video" rows="3"></textarea>
                <input type="file" id="video-file" accept="video/*" required>
                <button id="upload-btn"><i class="fas fa-upload" style="margin-right: 8px;"></i>Upload</button>
                <div id="upload-progress"></div>
            </div>

            <!-- Video Saya -->
            <div class="videos-section">
                <h2><i class="fas fa-video" style="margin-right: 12px;"></i>Video Saya</h2>
                <div class="video-grid" id="my-videos-grid"></div>
            </div>
        </div>

        <!-- Tampilan ketika belum login -->
        <div id="logged-out-view" style="display: block;">
            <i class="fas fa-lock" style="font-size: 4rem; color: #ff4b2b; margin-bottom: 1rem;"></i>
            <h2>Anda belum login</h2>
            <p style="margin: 1.5rem 0; font-size: 1.2rem;">Silakan <a href="login.html">login</a> untuk melihat profil.</p>
            <a href="login.html" style="background: linear-gradient(145deg, #ff416c, #ff4b2b); padding: 1rem 3rem; border-radius: 50px; color: white; text-decoration: none; font-weight: bold; display: inline-block; box-shadow: 0 10px 20px rgba(255,75,43,0.4);">Login Sekarang</a>
        </div>
    </div>

    <!-- Modal Konfirmasi Hapus Video -->
    <div id="deleteModal" class="delete-modal">
        <div class="modal-content">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Hapus Video</h3>
            <p id="deleteVideoTitle">Apakah Anda yakin ingin menghapus video ini?</p>
            <div class="modal-actions">
                <button id="cancelDelete" class="cancel-btn">Batal</button>
                <button id="confirmDelete" class="confirm-btn">Hapus</button>
            </div>
        </div>
    </div>

    <!-- Modal Konfirmasi Logout -->
    <div id="logoutModal" class="delete-modal">
        <div class="modal-content">
            <i class="fas fa-sign-out-alt"></i>
            <h3>Logout</h3>
            <p>Apakah Anda yakin ingin logout?</p>
            <div class="modal-actions">
                <button id="cancelLogout" class="cancel-btn">Batal</button>
                <button id="confirmLogout" class="confirm-btn">Iya</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        // Konfigurasi Supabase
        const SUPABASE_URL = 'https://dpnouqcvofdhylahjhqq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwbm91cWN2b2ZkaHlsYWhqaHFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjU1MzYsImV4cCI6MjA4ODA0MTUzNn0.z0DUqOSRIjnLvdeqT6O_-5VV1UZ62Y5SsC0dFNmwafM';

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { autoRefreshToken: true, persistSession: true }
        });

        // Elemen DOM
        const loggedInView = document.getElementById('logged-in-view');
        const loggedOutView = document.getElementById('logged-out-view');
        const profilePhoto = document.getElementById('profile-photo');
        const profileName = document.getElementById('profile-name');
        const profileEmail = document.getElementById('profile-email');
        const profileId = document.getElementById('profile-id');
        const logoutBtn = document.getElementById('logout-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const videoTitle = document.getElementById('video-title');
        const videoDesc = document.getElementById('video-desc');
        const videoFile = document.getElementById('video-file');
        const uploadProgress = document.getElementById('upload-progress');
        const myVideosGrid = document.getElementById('my-videos-grid');

        // Modal hapus
        const deleteModal = document.getElementById('deleteModal');
        const deleteVideoTitle = document.getElementById('deleteVideoTitle');
        const cancelDelete = document.getElementById('cancelDelete');
        const confirmDelete = document.getElementById('confirmDelete');

        // Modal logout
        const logoutModal = document.getElementById('logoutModal');
        const cancelLogout = document.getElementById('cancelLogout');
        const confirmLogout = document.getElementById('confirmLogout');

        let currentUser = null;
        let videoToDelete = null; // menyimpan data video yang akan dihapus

        // Muat sesi
        async function loadSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUser = session?.user ?? null;
            updateUI(currentUser);
            if (currentUser) loadMyVideos();
        }

        function updateUI(user) {
            if (user) {
                loggedInView.style.display = 'block';
                loggedOutView.style.display = 'none';
                
                const fullName = user.user_metadata?.full_name || user.email || 'User';
                const avatarUrl = user.user_metadata?.avatar_url || 
                    `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&background=ff4b2b&color=fff&size=128`;
                
                profilePhoto.src = avatarUrl;
                profilePhoto.onerror = () => {
                    profilePhoto.src = 'https://via.placeholder.com/120?text=User';
                };
                
                profileName.textContent = fullName;
                profileEmail.textContent = user.email || '-';
                profileId.textContent = user.id || '-';
            } else {
                loggedInView.style.display = 'none';
                loggedOutView.style.display = 'block';
            }
        }

        supabaseClient.auth.onAuthStateChange((event, session) => {
            currentUser = session?.user ?? null;
            updateUI(currentUser);
            if (currentUser) loadMyVideos();
        });

        loadSession();

        // Logout dengan konfirmasi
        logoutBtn?.addEventListener('click', () => {
            logoutModal.style.display = 'flex';
        });

        cancelLogout.addEventListener('click', () => {
            logoutModal.style.display = 'none';
        });

        confirmLogout.addEventListener('click', async () => {
            logoutModal.style.display = 'none';
            const { error } = await supabaseClient.auth.signOut();
            if (error) {
                alert('Logout gagal: ' + error.message);
            } else {
                // Redirect ke halaman utama
                window.location.href = 'index.html';
            }
        });

        // Fungsi generate thumbnail
        function generateThumbnail(videoFile) {
            return new Promise((resolve, reject) => {
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.playsInline = true;
                video.muted = true;
                video.src = URL.createObjectURL(videoFile);
                
                video.onloadeddata = () => video.currentTime = 1;
                video.onseeked = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        blob ? resolve(blob) : reject('Gagal thumbnail');
                        URL.revokeObjectURL(video.src);
                    }, 'image/jpeg', 0.8);
                };
                video.onerror = () => reject('Gagal load video');
            });
        }

        // Upload dengan simulasi progress
        async function uploadWithSimulatedProgress(file, filePath, onProgress) {
            let progress = 0;
            const interval = setInterval(() => {
                if (progress < 90) {
                    progress += 10;
                    onProgress(progress);
                }
            }, 300);
            try {
                const { error, data } = await supabaseClient.storage
                    .from('videos')
                    .upload(filePath, file, { cacheControl: '3600', upsert: false });
                clearInterval(interval);
                if (!error) onProgress(100);
                return { data, error };
            } catch (err) {
                clearInterval(interval);
                return { error: err };
            }
        }

        // Upload video
        uploadBtn.addEventListener('click', async () => {
            if (!currentUser) return alert('Harus login!');
            const title = videoTitle.value.trim();
            const desc = videoDesc.value.trim();
            const file = videoFile.files[0];
            if (!title || !file) return alert('Judul dan file wajib diisi!');
            if (!file.type.startsWith('video/')) return alert('File harus video!');

            uploadBtn.disabled = true;
            uploadProgress.textContent = 'Mempersiapkan...';

            try {
                const timestamp = Date.now();

                // 1. Generate thumbnail
                uploadProgress.textContent = 'Membuat thumbnail...';
                const thumbBlob = await generateThumbnail(file);
                const thumbPath = `thumbnails/${timestamp}_thumb.jpg`;
                const { error: thumbErr } = await supabaseClient.storage
                    .from('videos')
                    .upload(thumbPath, thumbBlob);
                if (thumbErr) throw thumbErr;
                const { data: thumbUrl } = supabaseClient.storage.from('videos').getPublicUrl(thumbPath);
                
                // 2. Upload video
                const videoPath = `videos/${timestamp}_${file.name}`;
                const { error: vidErr } = await uploadWithSimulatedProgress(file, videoPath, p => {
                    uploadProgress.textContent = `Upload video... ${Math.round(p)}%`;
                });
                if (vidErr) throw vidErr;
                const { data: vidUrl } = supabaseClient.storage.from('videos').getPublicUrl(videoPath);

                // 3. Simpan metadata
                const { error: dbErr } = await supabaseClient
                    .from('videos')
                    .insert({
                        title,
                        description: desc,
                        video_url: vidUrl.publicUrl,
                        thumbnail_url: thumbUrl.publicUrl,
                        user_id: currentUser.id,
                        user_email: currentUser.email,
                        user_name: currentUser.user_metadata?.full_name || 'Anonim',
                    });
                if (dbErr) throw dbErr;

                // Reset form
                videoTitle.value = '';
                videoDesc.value = '';
                videoFile.value = '';
                uploadProgress.textContent = 'Upload berhasil!';
                setTimeout(() => uploadProgress.textContent = '', 3000);
            } catch (err) {
                alert('Gagal: ' + err.message);
            } finally {
                uploadBtn.disabled = false;
            }
        });

        // Muat video milik user
        async function loadMyVideos() {
            if (!currentUser) return;
            const { data, error } = await supabaseClient
                .from('videos')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Gagal memuat video:', error);
                return;
            }
            renderMyVideos(data || []);
        }

        function renderMyVideos(videos) {
            myVideosGrid.innerHTML = '';
            if (videos.length === 0) {
                myVideosGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#aaa; padding:3rem;"><i class="fas fa-film" style="font-size:3rem; opacity:0.5; margin-bottom:1rem; display:block;"></i>Belum ada video.</p>';
                return;
            }

            videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="thumbnail" style="background-image: ${v.thumbnail_url ? `url('${v.thumbnail_url}')` : 'linear-gradient(145deg, #3a3a5a, #2a2a3a)'};"></div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(v.title) || 'Tanpa judul'}</div>
                        <button class="delete-btn" data-id="${v.id}" data-title="${escapeHtml(v.title)}" data-url="${v.video_url || ''}" data-thumb="${v.thumbnail_url || ''}"><i class="fas fa-trash-alt" style="margin-right:6px;"></i>Hapus</button>
                    </div>
                `;

                // Klik card untuk mainkan video (redirect ke index dengan parameter play)
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-btn') || e.target.closest('.delete-btn')) return;
                    window.location.href = `index.html?play=${v.id}`;
                });

                // Tombol hapus - buka modal
                const deleteBtn = card.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // Simpan data video yang akan dihapus
                    videoToDelete = {
                        id: v.id,
                        title: v.title,
                        video_url: v.video_url,
                        thumbnail_url: v.thumbnail_url
                    };
                    deleteVideoTitle.textContent = `Apakah Anda yakin ingin menghapus "${v.title}"?`;
                    deleteModal.style.display = 'flex';
                });

                myVideosGrid.appendChild(card);
            });
        }

        // Fungsi hapus video (dipanggil dari modal)
        async function deleteVideo() {
            if (!videoToDelete) return;

            try {
                // Hapus file dari storage
                if (videoToDelete.video_url) {
                    const videoPath = videoToDelete.video_url.split('/').slice(-2).join('/');
                    await supabaseClient.storage.from('videos').remove([videoPath]);
                }
                if (videoToDelete.thumbnail_url) {
                    const thumbPath = videoToDelete.thumbnail_url.split('/').slice(-2).join('/');
                    await supabaseClient.storage.from('videos').remove([thumbPath]);
                }

                // Hapus record
                const { error } = await supabaseClient.from('videos').delete().eq('id', videoToDelete.id);
                if (error) throw error;

                // Tutup modal
                deleteModal.style.display = 'none';
                videoToDelete = null;

                // Reload video
                loadMyVideos();
            } catch (err) {
                alert('Gagal hapus: ' + err.message);
                deleteModal.style.display = 'none';
            }
        }

        // Event listener modal hapus
        cancelDelete.addEventListener('click', () => {
            deleteModal.style.display = 'none';
            videoToDelete = null;
        });

        confirmDelete.addEventListener('click', deleteVideo);

        // Klik di luar modal untuk menutup (untuk kedua modal)
        window.addEventListener('click', (e) => {
            if (e.target === deleteModal) {
                deleteModal.style.display = 'none';
                videoToDelete = null;
            }
            if (e.target === logoutModal) {
                logoutModal.style.display = 'none';
            }
        });

        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/[&<>"]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' })[m]);
        }
    </script>
</body>

</html>
